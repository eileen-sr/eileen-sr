syntax = "proto3";
package proto;


import "common.define.proto";
import "common.gamecore.proto";

enum MissionStatus {
    MISSION_NONE = 0;
    MISSION_DOING = 1;
    MISSION_FINISH = 2;
    MISSION_PREPARED = 3;
}
message PileItem {
    uint32 item_id = 1;
    uint32 item_num = 2;
}
message ItemCost {
    oneof Item {
        PileItem pile_item = 1;
        uint32 unique_id = 2;
    }
}
message ItemCostData {
    repeated ItemCost item_list = 1;
}
message DropItem {
    uint32 item_id = 1;
    uint32 level = 2;
    uint32 rank = 3;
    uint32 num = 4;
}
message DropData {
    repeated DropItem item_list = 1;
}
message RewardItem {
    uint32 item_id = 1;
    uint32 level = 2;
    uint32 rank = 3;
    uint32 num = 4;
    uint32 promotion = 5;
}
message RewardData {
    repeated RewardItem item_list = 1;
}
message SceneMonsterWave {
    repeated uint32 monster_id_list = 1;
    repeated DropData drop_list = 2;
}
message SceneBattleInfo {
    uint32 logic_random_seed = 1;
    uint32 stage_id = 2;
    repeated SceneMonsterWave monster_wave_list = 3;
    repeated BattleAvatar battle_avatar_list = 4;
    repeated BattleBuff buff_list = 5;
}
